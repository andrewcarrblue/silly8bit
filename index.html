<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodore 64 - Ghostbusters Launcher</title>
    <style>
        body {
            /* Classic C64 Light Blue Border */
            background-color: #887ECB; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .monitor {
            background-color: #312885; /* Classic C64 Dark Blue Screen */
            width: 800px;
            height: 500px;
            border: 40px solid #887ECB;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .c64-boot-text {
            color: #887ECB;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            text-align: center;
        }
        .c64-terminal {
            color: #887ECB;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            text-align: left;
            margin-top: 40px;
        }
        .cursor {
            display: inline-block;
            width: 12px;
            height: 18px;
            background-color: #887ECB;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .launcher-menu {
            margin-top: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .title {
            color: #FFFFFF;
            font-size: 40px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #000;
        }
        .play-button {
            margin-top: 20px;
            background-color: #894036; /* C64 Red */
            color: #FFFFFF;
            border: 4px solid #FFFFFF;
            padding: 15px 30px;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.1s, background-color 0.2s;
        }
        .play-button:hover {
            background-color: #A85353; /* Lighter Red */
            transform: scale(1.05);
        }
        .play-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="monitor">
        
        <div class="c64-boot-text">
            **** COMMODORE 64 BASIC V2 ****<br><br>
            64K RAM SYSTEM  38911 BASIC BYTES FREE
        </div>

        <div class="c64-terminal">
            READY.<br>
            LOAD "GHOSTBUSTERS",8,1<br><br>
            SEARCHING FOR GHOSTBUSTERS<br>
            LOADING<br>
            READY.<br>
            RUN<span class="cursor"></span>
        </div>

        <div class="launcher-menu">
            <div class="title">GHOSTBUSTERS</div>
            <a href="ghostbusters.html" class="play-button">PRESS PLAY ON TAPE</a>
        </div>

    </div>

</body>
</html>
