<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodore 64 - Multi-Game Launcher</title>
    <style>
        body {
            /* Classic C64 Light Blue Border */
            background-color: #887ECB; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .monitor {
            background-color: #312885; /* Classic C64 Dark Blue Screen */
            width: 800px;
            height: 500px;
            border: 40px solid #887ECB;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .c64-boot-text {
            color: #887ECB;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            text-align: center;
        }
        .c64-terminal {
            color: #887ECB;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.5;
            text-align: left;
            margin-top: 20px;
        }
        .cursor {
            display: inline-block;
            width: 12px;
            height: 18px;
            background-color: #887ECB;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .launcher-menu {
            margin-top: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .menu-title {
            color: #FFFFFF;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px #000;
            border-bottom: 2px solid #887ECB;
            padding-bottom: 5px;
        }
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
        }
        .play-button {
            background-color: #894036; /* C64 Red */
            color: #FFFFFF;
            border: 4px solid #FFFFFF;
            padding: 15px 20px;
            font-size: 22px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: left;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .play-button:hover {
            background-color: #A85353; /* Lighter Red */
            transform: scale(1.02);
        }
        .play-button:active {
            transform: scale(0.98);
        }
        .disk-number {
            color: #B8C76F; /* C64 Yellow */
        }
    </style>
</head>
<body>

    <div class="monitor">
        
        <div class="c64-boot-text">
            **** COMMODORE 64 BASIC V2 ****<br><br>
            64K RAM SYSTEM  38911 BASIC BYTES FREE
        </div>

        <div class="c64-terminal">
            READY.<br>
            LOAD "MENU",8,1<br><br>
            SEARCHING FOR MENU<br>
            LOADING<br>
            READY.<br>
            RUN<span class="cursor"></span>
        </div>

        <div class="launcher-menu">
            <div class="menu-title">SELECT PROGRAM</div>
            
            <div class="game-list">
                <a href="ghostbusters.html" class="play-button">
                    <span>GHOSTBUSTERS</span>
                    <span class="disk-number">DISK 1</span>
                </a>

                <a href="adventuregame.html" class="play-button">
                    <span>TEXT ADVENTURE</span>
                    <span class="disk-number">DISK 2</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
